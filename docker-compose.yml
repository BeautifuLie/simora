services:
  # Bitnami Kafka — single-node KRaft broker with SCRAM-SHA-512 auth
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: SASL_PLAINTEXT://:9096,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:9096
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-512
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_CLIENT_USERS: kafkauser
      KAFKA_CLIENT_PASSWORDS: kafkapassword
      KAFKA_INTER_BROKER_USER: kafkauser
      KAFKA_INTER_BROKER_PASSWORD: kafkapassword
    ports:
      - "9096:9096"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9096", "--list",
             "--command-config", "/opt/bitnami/kafka/config/producer.properties"]
      interval: 5s
      timeout: 10s
      retries: 15

  # LocalStack — AWS service emulator (SQS)
  localstack:
    image: localstack/localstack:3.7
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
