name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    build:
        name: Build ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - name: Linux (amd64)
                      os: ubuntu-22.04
                      platform: linux/amd64

                    - name: macOS (universal)
                      os: macos-latest
                      platform: darwin/universal

                    - name: Windows (amd64)
                      os: windows-latest
                      platform: windows/amd64

        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 🔧 Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: 1.26

            - name: 🧰 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 18

            - name: 📦 Install Wails
              run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

            - name: 🐧 Install Linux dependencies
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

            - name: 🪟 Install NSIS
              if: runner.os == 'Windows'
              run: choco install nsis --no-progress -y

            - name: 🗃️ Cache node_modules
              uses: actions/cache@v4
              with:
                  path: frontend/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

            - name: 🐿️ Cache Go modules
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

            - name: 📥 Install frontend deps
              run: make deps

            - name: 🏗 Build
              if: runner.os != 'Windows'
              run: wails build -platform ${{ matrix.platform }} -ldflags "-X main.Version=${{ github.ref_name }}"

            - name: 🏗 Build (NSIS installer)
              if: runner.os == 'Windows'
              run: wails build -platform ${{ matrix.platform }} -nsis -ldflags "-X main.Version=${{ github.ref_name }}"

            - name: 🐧 Rename Linux binary
              if: runner.os == 'Linux'
              run: cp build/bin/simora build/bin/simora-linux-amd64

            - name: 💿 Create macOS DMG
              if: runner.os == 'macOS'
              run: |
                  mkdir -p /tmp/dmg-stage
                  cp -r build/bin/simora.app /tmp/dmg-stage/
                  ln -s /Applications /tmp/dmg-stage/Applications
                  hdiutil create \
                    -volname "Simora" \
                    -srcfolder /tmp/dmg-stage \
                    -ov -format UDZO \
                    build/bin/simora-darwin-universal.dmg

            - name: 🪟 Rename Windows installer
              if: runner.os == 'Windows'
              run: mv build/bin/simora-amd64-installer.exe build/bin/simora-windows-amd64-setup.exe

            - name: 📤 Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ runner.os }}
                  path: |
                      build/bin/simora-linux-amd64
                      build/bin/simora-darwin-universal.dmg
                      build/bin/simora-windows-amd64-setup.exe

    release:
        name: Create GitHub Release
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: 📦 Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: 🚀 Create Release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  body: |
                      See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
                  files: |
                      dist/simora-linux-amd64
                      dist/simora-darwin-universal.dmg
                      dist/simora-windows-amd64-setup.exe
                  draft: false
                  prerelease: ${{ contains(github.ref_name, '-') }}
